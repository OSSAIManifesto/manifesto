<svg xmlns="http://www.w3.org/2000/svg" width="98" height="20" viewBox="0 0 98 20" role="img" aria-label="Human OSS">
  <title>Human OSS</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="98" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="20" height="20" fill="#555"/>
    <rect x="20" width="78" height="20" fill="#333"/>
    <rect width="98" height="20" fill="url(#s)"/>
  </g>
  <!-- Diamond icon -->
  <rect x="5.5" y="5.5" width="9" height="9" rx="2" fill="url(#g)" transform="rotate(45 10 10)"/>
  <!-- Text -->
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
    <text x="58" y="15" fill="#010101" fill-opacity=".3">Human OSS</text>
    <text x="58" y="14">Human OSS</text>
  </g>
</svg>
