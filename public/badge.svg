<svg xmlns="http://www.w3.org/2000/svg" width="94" height="20" viewBox="0 0 94 20" role="img" aria-label="Human OSS">
  <title>Human OSS</title>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="94" height="20" rx="3" fill="#111111"/>
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="93" height="19" rx="2.5" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Gradient diamond mark -->
  <rect x="6" y="5.5" width="9" height="9" rx="2" fill="url(#g)" transform="rotate(45 10.5 10)"/>
  <!-- Text -->
  <text x="54" y="10" dominant-baseline="central" text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-size="11" font-weight="600" letter-spacing="0.3" fill="#e5e5e5">Human OSS</text>
</svg>
